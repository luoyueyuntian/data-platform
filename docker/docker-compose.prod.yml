services:
  api:
    build:
      context: ..
      dockerfile: docker/services/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://ssas:${DB_PASSWORD:-ssas}@postgres:5432/ssas
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKER: kafka:9092
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: docker/services/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api/v1
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/services/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://ssas:${DB_PASSWORD:-ssas}@postgres:5432/ssas
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKER: kafka:9092
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      mosquitto:
        condition: service_started
    restart: unless-stopped

  # Single PostgreSQL instance with TimescaleDB extension
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ssas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ssas}
      POSTGRES_DB: ssas
      TIMESCALEDB_TELEMETRY: off
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ssas -d ssas']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.9.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - '1883:1883'
    volumes:
      - ./services/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
