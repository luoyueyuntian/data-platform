version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/services/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=postgres://ssas:ssas@postgres:5432/ssas
      - TIMESCALE_URL=postgres://ssas:ssas@timescaledb:5432/ssas_ts
    depends_on:
      - postgres
      - timescaledb
      - redis

  web:
    build:
      context: ..
      dockerfile: docker/services/web/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - api

  worker:
    build:
      context: ..
      dockerfile: docker/services/worker/Dockerfile
    depends_on:
      - postgres
      - timescaledb
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ssas
      POSTGRES_PASSWORD: ssas
      POSTGRES_DB: ssas
    volumes:
      - pgdata:/var/lib/postgresql/data

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ssas
      POSTGRES_PASSWORD: ssas
      POSTGRES_DB: ssas_ts
    volumes:
      - tsdbdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  tsdbdata:
  redisdata:
